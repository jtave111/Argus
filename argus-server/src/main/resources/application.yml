spring:
  application:
    name: argus-server

  # Virtual Threads (Project Loom) — segura milhares de conexões gRPC de agentes
  # gastando pouca memória. Requer Java 21+.
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${ARGUS_DB_URL:jdbc:postgresql://localhost:5432/argus}
    username: ${ARGUS_DB_USER:zero}
    password: ${ARGUS_DB_PASSWORD:}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 7

  jooq:
    sql-dialect: postgres

server:
  port: 8080

# Porta do servidor gRPC (net.devh). O dashboard usa a porta 8080 (HTTP/WS).
grpc:
  server:
    port: 9090
